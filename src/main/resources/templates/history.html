<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Navbar Component -->
    <section th:replace="~{navbar :: navbar}"></section>

    <!-- Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>Order History</h1>
                    <p>View your past orders and their status</p>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="container">
            <!-- History Stats -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" th:text="${session.numberOfOrders}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" th:text="${session.totalCompleted}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon error">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Failed</div>
                        <div class="stat-value" th:text="${session.cancelledOrder}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon info">
                        <i class="fas fa-rupee-sign"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Spent</div>
                        <span class="stat-value">₹<span th:text="${session.totalSpent}">---</span></span>
                        <!-- <div class="stat-value">₹180</div> -->
                    </div>
                </div>
            </div>

            <!-- History Table -->
            <div class="dashboard-main">
                <div class="section-header">
                    <h2>Order History</h2>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <!-- <th>Order ID</th> -->
                                <th>Item Name</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Total</th>
                                <th>Date</th>
                                <th>Status</th>
                                <!-- <th>Action</th> -->
                            </tr>
                        </thead>
                        <tbody>
                            <th:block th:each="order : ${order}">
                                <tr data-status="completed">
                                    <td>
                                        <div class="flex" style="gap: var(--spacing-sm);">
                                            <div class="adminItemsImg">
                                                <img th:src="${order.item.imageFile}" alt="img">
                                            </div>
                                            <span class="adminItemName" th:text="${order.item.itemName}">---</span>
                                        </div>
                                    </td>
                                    <td><span>₹<span th:text="${order.item.price}">---</span></span></td>
                                    <td th:text="${order.quantity}">---</td>
                                    <td><span>₹<span th:text="${order.item.price * order.quantity}">---</span></span></td>
                                    <td  th:text="${#temporals.format(order.orderTime, 'dd MMM yyyy hh:mm a')}">Oct 05, 2025</td>
                                    <td>
                                        <span class="order-status completed" th:if="${order.orderStatus.toString() == 'COMPLETED'}">
                                            <i class="fas fa-check-circle"></i> <span th:text="${order.orderStatus}">---</span>
                                        </span>
                                        <span class="order-status pending" th:if="${order.orderStatus.toString() == 'PENDING'}">
                                            <i class="fas fa-clock"></i> <span th:text="${order.orderStatus}">---</span>
                                        </span>
                                        <span class="order-status cancelled" th:if="${order.orderStatus.toString() == 'CANCELED'}">
                                            <i class="fas fa-cancel"></i> <span th:text="${order.orderStatus}">---</span>
                                        </span>
                                    </td>
                                </tr>
                            </th:block>
                        </tbody>
                    </table>
                </div>

                <!-- Empty State (hidden by default) -->
                <div class="empty-state hidden" id="empty-history">
                    <i class="fas fa-inbox fa-3x"></i>
                    <h3>No Order History</h3>
                    <p>You haven't placed any orders yet</p>
                    <a href="index.html" class="btn btn-primary">Browse Menu</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Component -->
    <section th:replace="~{footer :: footer}"></section>

    <!-- Modular JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // History search functionality
            const searchInput = document.getElementById('history-search');
            const tableRows = document.querySelectorAll('.table tbody tr');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();

                tableRows.forEach(row => {
                    const text = row.textContent.toLowerCase();

                    if (text.includes(query)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });

            // Filter functionality
            const filterSelect = document.querySelector('.form-select');
            filterSelect.addEventListener('change', (e) => {
                const filter = e.target.value;

                tableRows.forEach(row => {
                    const status = row.dataset.status;

                    if (filter === 'all' || status === filter) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });

            // View button functionality
            document.querySelectorAll('.table .btn-outline').forEach(btn => {
                btn.addEventListener('click', () => {
                    toast.info('Order details modal would open here');
                });
            });
        });
    </script>

</body>

</html>
