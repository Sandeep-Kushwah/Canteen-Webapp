<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- Navbar Component -->
    <section th:replace="~{navbar :: navbar}"></section>

    <!-- Payment Section -->
    <div class="auth-container">
        <div class="auth-card payment-card">
            <div class="auth-header">
                <h1>Payment</h1>
                <p>Complete your payment securely</p>
            </div>

            <!-- Order Summary -->
            <div class="payment-summary">
                <h3>Order Summary</h3>
                <div class="summary-item">
                    <span>Item Name</span>
                    <span id="summary-item">Classic Burger</span>
                </div>
                <div class="summary-item">
                    <span>Quantity</span>
                    <span id="summary-quantity">1</span>
                </div>
                <div class="summary-item">
                    <span>Price</span>
                    <span id="summary-price">₹20</span>
                </div>
                <hr class="HR">
                <div class="summary-item total">
                    <span>Total</span>
                    <span id="summary-total" class="total-amount">₹20</span>
                </div>
            </div>

            <!-- Pay Button -->
            <button class="auth-submit-btn" id="pay-btn">
                <i class="fas fa-lock"></i>
                Pay Now
            </button>

            <!-- Cancel Button -->
            <div class="auth-footer">
                <a href="home" class="cancel-link">
                    <i class="fas fa-arrow-left"></i> Back to Menu
                </a>
            </div>
        </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const itemName = urlParams.get('item');
            const price = urlParams.get('price');
            const quantity = urlParams.get('quantity');
            const total = parseInt(price) * parseInt(quantity);

            // Update summary
            document.getElementById('summary-item').textContent = itemName;
            document.getElementById('summary-quantity').textContent = quantity;
            document.getElementById('summary-price').textContent = '₹' + price;
            document.getElementById('summary-total').textContent = '₹' + total;

            const formData = new FormData();
            formData.append("id", id);
            formData.append("price", price);
            formData.append("quantity", quantity);
            formData.append("total", total);

            // Pay button
            const payBtn = document.getElementById('pay-btn');
            payBtn.addEventListener('click', async () => {

                // Simulate payment processing
                payBtn.disabled = true;
                payBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

                const response = await fetch('/placeOrder', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.text();

                payBtn.disabled = false;
                payBtn.innerHTML = `<i class="fas fa-lock"></i> Pay Now`;

                if (result == 'success') {
                        toast.success('Payment successful! Order placed.');
                        setTimeout(() => {
                            window.location.href = 'order';
                        }, 1500);
                } else {
                    toast.error('Payment Failed! Order does\'n place.');
                }
            });
        });
    </script>

</body>

</html>
