<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset=" UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/carousel.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <section th:replace="~{navbar :: navbar}"></section>

    <!-- Hero Carousel -->
    <section class="carousel" data-carousel data-autoplay="true" data-interval="5000">
        <!-- Slide 1 -->
        <div class="carousel-slide active">
            <img src="images/hero-bg.jpg" alt="Delicious Food">
            <div class="carousel-overlay"></div>
            <div class="carousel-content">
                <h1>Delicious Food Is Here</h1>
                <p>Order your favorite meals from our canteen</p>
                <button class="btn btn-primary" onclick="scrollToMenu()">
                    Order Now <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="carousel-slide">
            <img src="images/pre-prepared-food-showcasing-ready-eat-delicious-meals-go.jpg" alt="Fresh Meals">
            <div class="carousel-overlay"></div>
            <div class="carousel-content">
                <h1>Fresh & Healthy Meals</h1>
                <p>Prepared daily with fresh ingredients</p>
                <button class="btn btn-primary" onclick="scrollToMenu()">
                    View Menu <i class="fas fa-utensils"></i>
                </button>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="carousel-slide">
            <img src="images/ramadan-celebration-with-delicious-food.jpg" alt="Special Offers">
            <div class="carousel-overlay"></div>
            <div class="carousel-content">
                <h1>Special Offers</h1>
                <p>Get 20% off on your first order</p>
                <button class="btn btn-primary" onclick="scrollToMenu()">
                    Order Now <i class="fas fa-tag"></i>
                </button>
            </div>
        </div>

        <!-- Navigation Arrows -->
        <button class="carousel-arrow carousel-prev" aria-label="Previous slide">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="carousel-arrow carousel-next" aria-label="Next slide">
            <i class="fas fa-chevron-right"></i>
        </button>

        <!-- Dots -->
        <div class="carousel-dots"></div>

        <!-- Progress Bar -->
        <div class="carousel-progress">
            <div class="carousel-progress-bar"></div>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="container" id="menu-section" style="padding-top: var(--spacing-3xl);">
        <!-- Category Filter -->
        <div class="category-filter">
            <div class="category-filter-container">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="BURGER">Burger</button>
                <button class="filter-btn" data-filter="FOOD">Food</button>
                <button class="filter-btn" data-filter="JUICE">Juice</button>
                <button class="filter-btn" data-filter="CHOCOLATE">Chocolate</button>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">


            <th:block th:each="item : ${allItems}">

                <!-- Product -->
                <div class="product-card" th:data-category="${item.category}" th:data-id="${item.itemId}"
                    th:data-price="${item.price}" th:data-name="${item.itemName}">
                    <div class="product-image">
                        <img th:src="${item.imageFile}" th:alt="${item.category}">
                        <span class="product-badge" th:text="${item.badge}">---</span>
                        <button class="product-wishlist wishlist-btn" th:data-id="${item.itemId}"
                            th:data-price="${item.price}" th:data-name="${item.itemName}">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                    <div class="product-body">
                        <p class="product-category" th:text="${item.category}">---</p>
                        <h3 class="product-name" th:text="${item.itemName}">---</h3>
                        <p class="product-description" th:text="${item.discription}">---</p>
                        <div class="product-footer">
                            <span class="product-price">₹<span class="product-price"
                                    th:text="${item.price}">---</span></span>
                            <div class="product-actions">
                                <div class="quantity-control">
                                    <button class="quantity-btn decrease-btn">-</button>
                                    <span class="quantity-display">1</span>
                                    <button class="quantity-btn increase-btn">+</button>
                                </div>
                                <button class="buy-now-btn" th:data-id="${item.itemId}" th:data-price="${item.price}"
                                    th:data-name="${item.itemName}">
                                    Buy
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </th:block>
        </div>
    </section>

    <!-- Footer Component -->
    <section th:replace="~{footer :: footer}"></section>

    <!-- Modular JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/carousel.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>

        document.addEventListener('DOMContentLoaded', () => {

            // =========================
            // CATEGORY FILTER
            // =========================

            const filterBtns = document.querySelectorAll('.filter-btn');

            const productCards =
                document.querySelectorAll('.product-card');

            filterBtns.forEach(btn => {

                btn.addEventListener('click', () => {

                    filterBtns.forEach(b =>
                        b.classList.remove('active')
                    );

                    btn.classList.add('active');

                    const filter = btn.dataset.filter;

                    productCards.forEach(card => {

                        if (
                            filter === 'all' ||
                            card.dataset.category === filter
                        ) {

                            card.style.display = 'block';

                        } else {

                            card.style.display = 'none';
                        }
                    });
                });
            });


            // =========================
            // PRODUCT CARD FEATURES
            // =========================

            productCards.forEach(card => {

                const decreaseBtn =
                    card.querySelector('.decrease-btn');

                const increaseBtn =
                    card.querySelector('.increase-btn');

                const quantityDisplay =
                    card.querySelector('.quantity-display');

                const buyNowBtn =
                    card.querySelector('.buy-now-btn');

                const wishlistBtn =
                    card.querySelector('.wishlist-btn');

                let quantity = 1;


                // =========================
                // DECREASE
                // =========================

                decreaseBtn.addEventListener('click', () => {

                    if (quantity > 1) {

                        quantity--;

                        quantityDisplay.textContent = quantity;
                    }
                });


                // =========================
                // INCREASE
                // =========================

                increaseBtn.addEventListener('click', () => {

                    if (quantity < 5) {

                        quantity++;

                        quantityDisplay.textContent = quantity;
                    }
                });


                // =========================
                // BUY NOW
                // =========================

                buyNowBtn.addEventListener('click', () => {

                    const id =
                        buyNowBtn.dataset.id;

                    const price =
                        buyNowBtn.dataset.price;

                    const name =
                        buyNowBtn.dataset.name;

                    const qty =
                        quantityDisplay.textContent;

                    console.log("ID : ", id);

                    window.location.href =
                        `payment?item=${encodeURIComponent(name)}&id=${id}&price=${price}&quantity=${qty}`;
                });


                // =========================
                // WISHLIST
                // =========================

                wishlistBtn.addEventListener('click', () => {

                    const id =
                        wishlistBtn.dataset.id;

                    const price =
                        wishlistBtn.dataset.price;

                    const name =
                        wishlistBtn.dataset.name;

                    console.log("Wishlist:", id);

                    wishlistBtn.classList.toggle('active');

                    const icon =
                        wishlistBtn.querySelector('i');

                    icon.classList.toggle('fa-regular');

                    icon.classList.toggle('fa-solid');
                });

            });

        });
    </script>

</body>

</html>
