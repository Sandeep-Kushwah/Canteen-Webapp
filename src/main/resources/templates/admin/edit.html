<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Items - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <!-- Admin Navbar -->
    <section th:replace="~{admin/admin-navbar :: admin-navbar}"></section>

    <!-- Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>Edit Menu Items</h1>
                    <p>Manage and update food items in the menu</p>
                </div>
                <div class="dashboard-actions">
                    <a href="add" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add New Item
                    </a>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="container">
            <!-- Category Filter -->
            <div class="category-filter">
                <div class="category-filter-container">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="BURGER">Burger</button>
                    <button class="filter-btn" data-filter="FOOD">Food</button>
                    <button class="filter-btn" data-filter="JUICE">Juice</button>
                    <button class="filter-btn" data-filter="CHOCOLATE">Chocolate</button>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="product-grid" id="edit-grid">

                <th:block th:each="item : ${allItems}">

                    <!-- Product -->
                    <div class="product-card" th:data-category="${item.category}" th:data-id="${item.itemId}">
                        <div class="product-image">
                            <img th:src="${item.imageFile}" th:alt="${item.category}">
                            <span class="product-badge" th:text="${item.badge}">---</span>
                            <div class="product-actions-overlay">
                                <button class="btn btn-sm btn-primary edit-item" th:data-id="${item.itemId}">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn btn-sm btn-danger delete-item" th:data-id="${item.itemId}">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                        <div class="product-body">
                            <p class="product-category" th:text="${item.category}">---</p>
                            <h3 class="product-name" th:text="${item.itemName}">---</h3>
                            <p class="product-description" th:text="${item.discription}">---</p>
                            <div class="product-footer">
                                <span class="product-price" >₹ <span class="product-price" th:text="${item.price}"></span></span>
                            </div>
                        </div>
                    </div>
                </th:block>


                <!-- Empty State (hidden by default) -->
                <div class="empty-state hidden" id="empty-items">
                    <i class="fas fa-box-open fa-3x"></i>
                    <h3>No Items Found</h3>
                    <p>There are no items in the menu</p>
                    <a href="add" class="btn btn-primary">Add First Item</a>
                </div>
            </div>
        </div>

        <!-- Modular JavaScript -->
        <script src="../js/utils.js"></script>
        <script src="../js/theme.js"></script>
        <script src="../js/toast.js"></script>
        <script src="../js/navbar.js"></script>
        <script src="../js/app.js"></script>

        <!-- Page-specific JavaScript -->
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const productCards = document.querySelectorAll('.product-card');
                const editGrid = document.getElementById('edit-grid');
                const emptyItems = document.getElementById('empty-items');

                // Category filter functionality
                const filterBtns = document.querySelectorAll('.filter-btn');
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                        const filter = btn.dataset.filter;
                        productCards.forEach(card => {
                            if (filter === 'all' || card.dataset.category === filter) {
                                card.style.display = 'block';
                                card.classList.add('animate-fadeIn');
                            } else {
                                card.style.display = 'none';
                            }
                        });
                    });
                });

                // Search functionality
                const searchInput = document.getElementById('admin-search');
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();

                    productCards.forEach(card => {
                        const name = card.querySelector('.product-name').textContent.toLowerCase();
                        const category = card.querySelector('.product-category').textContent.toLowerCase();

                        if (name.includes(query) || category.includes(query)) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });

                // Edit button functionality
                document.querySelectorAll('.edit-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        toast.info(`Edit item #${id} - Edit modal would open here`);
                        // In production, open edit modal with item details
                    });
                });

                // Delete button functionality
                document.querySelectorAll('.delete-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const card = btn.closest('.product-card');
                        const id = btn.dataset.id;

                        if (confirm('Are you sure you want to delete this item?')) {
                            card.remove();
                            toast.success('Item deleted successfully');

                            // Check if grid is empty
                            if (editGrid.children.length === 0) {
                                editGrid.classList.add('hidden');
                                emptyItems.classList.remove('hidden');
                            }
                        }
                    });
                });
            });
        </script>

</body>

</html>
