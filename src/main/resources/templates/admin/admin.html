<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <!-- Admin Navbar -->
    <section th:replace="~{admin/admin-navbar :: admin-navbar}"></section>

    <!-- Admin Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>Admin Dashboard</h1>
                    <p>Manage orders and track customer activity</p>
                </div>
                <div class="dashboard-actions">
                    <button class="btn btn-primary" onclick="location.reload()">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="container">
            <!-- Admin Stats -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" th:text="${session.adminTotalOrders}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon warning">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" th:text="${session.adminTotalPendingOrders}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" th:text="${session.adminTotalCompletedOrders}">---</div>
                    </div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="dashboard-main">
                <div class="section-header">
                    <h2>Current Orders</h2>
                    <div class="section-header-actions">
                        <select class="form-select" style="width: auto;">
                            <option value="all">All Status</option>
                            <option value="PENDING">Pending</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="CANCELED">Cancelled</option>
                        </select>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>User</th>
                                <th>Time</th>
                                <th>Price × Qty</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <th:block th:if="${orders != null}" th:each="orders : ${orders}">

                            <tbody>
                                <tr th:data-status="${orders.orderStatus}">
                                    <td>
                                        <div class="flex" style="gap: var(--spacing-sm);">
                                            <div class="adminItemsImg">
                                                <img th:src="${orders.item.imageFile}" alt="img">
                                            </div>
                                            <span class="adminItemName"
                                                th:text="${orders.item.itemName}">ItemName</span>
                                        </div>
                                    </td>
                                    <td th:text="${orders.user.name}">Username</td>
                                    <td th:text="${#temporals.format(orders.orderTime, 'dd/MM/yyyy hh:mm a')}">Time</td>
                                    <td><span>₹</span><span th:text="${orders.item.price}">price</span><span> ×
                                        </span><span th:text="${orders.quantity}">Quantity</span></td>
                                    <td>₹<span th:text="${orders.item.price * orders.quantity}">total</span></td>
                                    <td>
                                        <span class="order-status completed"
                                            th:if="${orders.orderStatus.toString() == 'COMPLETED'}">
                                            <i class="fas fa-check-circle"></i> Completed
                                        </span>
                                        <span class="order-status pending"
                                            th:if="${orders.orderStatus.toString() == 'PENDING'}">
                                            <i class="fas fa-clock"></i> Pending
                                        </span>
                                        <span class="order-status cancelled"
                                            th:if="${orders.orderStatus.toString() == 'CANCELED'}">
                                            <i class="fas fa-cancel"></i> Cancelled
                                        </span>
                                    </td>
                                    <td>
                                        <div class="flex-center" style="gap: var(--spacing-xs);">
                                            <button class="btn btn-sm btn-success complete-order order-buttons"
                                                th:data-id="${orders.orderId}" th:data-status="COMPLETED">
                                                <i class="fas fa-check"></i>
                                            </button>
                                            <button class="btn btn-sm btn-danger cancel-order order-buttons"
                                                th:data-id="${orders.orderId}" th:data-status="CANCELED">
                                                <i class="fas fa-times"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </th:block>
                    </table>
                </div>

                <!-- Empty State (hidden by default) -->
                <div class="empty-state" id="empty-orders" th:if="${orders == null}">
                    <i class="fas fa-inbox fa-3x"></i>
                    <h3>No Orders</h3>
                    <p>There are no pending orders at the moment</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="../js/utils.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Admin search functionality
            const searchInput = document.getElementById('admin-search');
            const tableRows = document.querySelectorAll('.table tbody tr');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();

                tableRows.forEach(row => {
                    const text = row.textContent.toLowerCase();

                    if (text.includes(query)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });

            // Filter functionality
            const filterSelect = document.querySelector('.form-select');
            filterSelect.addEventListener('change', (e) => {
                const filter = e.target.value;

                tableRows.forEach(row => {
                    const status = row.dataset.status;

                    if (filter === 'all' || status === filter) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });

            // Complete and cancel order button functionallity
            const orderButton = document.querySelectorAll(".order-buttons");
            orderButton.forEach(btn => {
                btn.addEventListener('click', async () => {

                    const formData = new FormData();

                    const id = btn.dataset.id;
                    const status = btn.dataset.status;

                    formData.append("id", id);
                    formData.append("status", status);

                    // alert("ID : " + id + "status  : " + status);

                    const response = await fetch('/admin/adminAction', {
                        method: 'POST',
                        body: formData
                    });

                    const row = btn.closest('tr');
                    const statusSpan = row.querySelector('.order-status');
                    const result = await response.text();

                    if (result == 'success') {
                        if (status == 'COMPLETED') {
                            statusSpan.className = 'order-status completed';
                            statusSpan.innerHTML = '<i class="fas fa-check-circle"></i> Completed';
                            row.dataset.status = 'completed';
                            toast.success('Order marked as completed');
                        }
                        // window.location.href="home";
                        if (status == 'CANCELED'){
                            statusSpan.className = 'order-status cancelled';
                            statusSpan.innerHTML = '<i class="fas fa-cancel"></i> Cancelled';
                            row.dataset.status = 'cancelled';
                            toast.success('Order marked as cancelled');
                        }
                    } else{
                        toast.error('Something went wrong')
                    }
                })
            });
        });
    </script>

</body>

</html>
