<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <!-- Admin Navbar -->
    <section th:replace="~{admin/admin-navbar :: admin-navbar}"></section>

    <!-- Admin Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>Admin Dashboard</h1>
                    <p>Manage orders and track customer activity</p>
                </div>
                <div class="dashboard-actions">
                    <button class="btn btn-secondary">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button class="btn btn-primary">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                </div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="dashboard-main">
            <div class="section-header">
                <h2>Current Orders</h2>
                <div class="section-header-actions">
                    <select class="form-select" style="width: auto;">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>User</th>
                            <th>Price × Qty</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-status="pending">
                            <td>
                                <div class="flex-center" style="gap: var(--spacing-sm);">
                                    <i class="fas fa-utensils" style="color: var(--primary-color);"></i>
                                    <span>Food</span>
                                </div>
                            </td>
                            <td>itz_sandeep_111</td>
                            <td>₹60 × 1</td>
                            <td>₹60</td>
                            <td>
                                <span class="order-status pending">
                                    <i class="fas fa-clock"></i> Pending
                                </span>
                            </td>
                            <td>
                                <div class="flex-center" style="gap: var(--spacing-xs);">
                                    <button class="btn btn-sm btn-success complete-order">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger cancel-order">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr data-status="pending">
                            <td>
                                <div class="flex-center" style="gap: var(--spacing-sm);">
                                    <i class="fas fa-hamburger" style="color: var(--primary-color);"></i>
                                    <span>Burger</span>
                                </div>
                            </td>
                            <td>itz_ratnesh_111</td>
                            <td>₹60 × 2</td>
                            <td>₹120</td>
                            <td>
                                <span class="order-status pending">
                                    <i class="fas fa-clock"></i> Pending
                                </span>
                            </td>
                            <td>
                                <div class="flex-center" style="gap: var(--spacing-xs);">
                                    <button class="btn btn-sm btn-success complete-order">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger cancel-order">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Empty State (hidden by default) -->
            <div class="empty-state hidden" id="empty-orders">
                <i class="fas fa-inbox fa-3x"></i>
                <h3>No Orders</h3>
                <p>There are no pending orders at the moment</p>
            </div>
        </div>
    </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="../js/utils.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Admin search functionality
            const searchInput = document.getElementById('admin-search');
            const tableRows = document.querySelectorAll('.table tbody tr');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();

                tableRows.forEach(row => {
                    const text = row.textContent.toLowerCase();

                    if (text.includes(query)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });

            // Filter functionality
            const filterSelect = document.querySelector('.form-select');
            filterSelect.addEventListener('change', (e) => {
                const filter = e.target.value;

                tableRows.forEach(row => {
                    const status = row.dataset.status;

                    if (filter === 'all' || status === filter) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });

            // Complete order button
            document.querySelectorAll('.complete-order').forEach(btn => {
                btn.addEventListener('click', () => {
                    const row = btn.closest('tr');
                    const statusSpan = row.querySelector('.order-status');

                    if (confirm('Mark this order as completed?')) {
                        statusSpan.className = 'order-status completed';
                        statusSpan.innerHTML = '<i class="fas fa-check-circle"></i> Completed';
                        row.dataset.status = 'completed';
                        toast.success('Order marked as completed');
                    }
                });
            });

            // Cancel order button
            document.querySelectorAll('.cancel-order').forEach(btn => {
                btn.addEventListener('click', () => {
                    const row = btn.closest('tr');
                    const statusSpan = row.querySelector('.order-status');

                    if (confirm('Cancel this order?')) {
                        statusSpan.className = 'order-status cancelled';
                        statusSpan.innerHTML = '<i class="fas fa-times-circle"></i> Cancelled';
                        row.dataset.status = 'cancelled';
                        toast.success('Order cancelled');
                    }
                });
            });
        });
    </script>

</body>

</html>
