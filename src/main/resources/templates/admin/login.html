<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <!-- Navbar Component -->
    <section th:replace="~{admin/admin-navbar :: admin-navbar}"></section>

    <!-- Login Section -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Admin Login</p>
            </div>

            <form action="/get-login" method="post" id="login-form"> <!-- data-validate class="auth-form"-->
                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="auth-input-group">
                        <input type="email" 
                               class="form-input" 
                               id="email" 
                               name="email" 
                               placeholder="Enter your Email"
                               required>
                        <i class="fas fa-user auth-input-icon"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="auth-input-group">
                        <input type="password" 
                               class="form-input" 
                               id="password" 
                               name="password" 
                               placeholder="Enter your password"
                               required>
                        <i class="fas fa-eye auth-input-icon password-toggle"></i>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex-between mb-2">
                    <label class="form-checkbox">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="auth-submit-btn" > <!--  data-loading="Logging in..." -->
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
            </form>
        </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="../js/utils.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>

        //             } else {

            // Google login button (UI only - backend OAuth required)
        //     const googleBtn = document.querySelector('.auth-google-btn');
        //     googleBtn.addEventListener('click', () => {
        //         toast.info('Google OAuth integration required for backend');
        //     });
        // });

        const loginForm = document.getElementById('login-form');

            loginForm.addEventListener('submit', async (e) => {

                e.preventDefault();

                const submitBtn = loginForm.querySelector('.auth-submit-btn');

                // Start loading
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Creating Account...`;

                try {

                    const formData = new FormData(loginForm);

                    const response = await fetch('/get-login', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.text();

                    if (result === 'success') {
                        toast.success('Login Successfull');
                        submitBtn.innerHTML = `<i class="fas fa-check"></i> Success`;

                        setTimeout(() => {
                            window.location.href = '/home';
                        }, 2000);

                    }else {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = `<i class="fas fa-user-plus"></i>Login`;
                        toast.error('Username/Password May Wrong !!!');
                    }

                } catch (error) {

                    console.error(error);

                    submitBtn.disabled = false;

                    submitBtn.innerHTML = `<i class="fas fa-user-plus"></i>Login`;

                    // alert("Server error");
                    // toast.success('Registration successful!');
                    setTimeout(() => {
                        toast.error('Login Failed !!!\nDue To Some Technical Issues');
                        // Redirect to login page after successful registration
                        setTimeout(() => {
                            window.location.href = 'login';
                        }, 1000);
                    }, 1500);

                }

            });
    </script>

</body>

</html>
