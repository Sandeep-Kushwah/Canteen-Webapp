<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <!-- Admin Navbar -->
    <section th:replace="~{admin/admin-navbar :: admin-navbar}"></section>

    <!-- Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>Order History</h1>
                    <p>View all completed orders and customer activity</p>
                </div>
                <div class="dashboard-actions">
                    <button class="btn btn-primary" onclick="location.reload()">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="container">
            <!-- History Stats -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" th:text="${session.adminTotalOrders}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" th:text="${session.adminTotalCompletedOrders}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon info">
                        <i class="fas fa-rupee-sign"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Revenue</div>
                        <div class="stat-value">₹<span th:text="${session.totalRevenue}"></span></div>
                    </div>
                </div>
            </div>

            <!-- History Table -->
            <div class="dashboard-main">
                <div class="section-header">
                    <h2>Order History</h2>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>CustomerItem Name</th>
                                <th>Customer</th>
                                <th>Amount(Total)</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <th:block th:if="${orders != null}" th:each="orders : ${orders}">
                                <tr th:data-status="${orders.orderStatus}">
                                    <td>
                                        <div class="adminItemsImg">
                                            <img th:src="${orders.item.imageFile}" alt="img">
                                        </div>
                                        <span th:text="${orders.item.itemName}">ItemName</span>
                                    </td>
                                    <td>
                                        <div class="flex" style="gap: var(--spacing-sm);">
                                            <span th:text="${orders.user.name}">Name</span>
                                        </div>
                                    </td>
                                    <td>₹<span th:text="${orders.item.price * orders.quantity}"></span></td>
                                    <td th:text="${#temporals.format(orders.orderTime, 'dd/MM/yyyy hh:mm a')}">Date </td>
                                    <td>
                                        <span class="order-status completed"
                                            th:if="${orders.orderStatus.toString() == 'COMPLETED'}">
                                            <i class="fas fa-check-circle"></i> Completed
                                        </span>
                                        <span class="order-status pending"
                                            th:if="${orders.orderStatus.toString() == 'PENDING'}">
                                            <i class="fas fa-clock"></i> Pending
                                        </span>
                                        <span class="order-status cancelled"
                                            th:if="${orders.orderStatus.toString() == 'CANCELED'}">
                                            <i class="fas fa-cancel"></i> Cancelled
                                        </span>
                                    </td>
                                </tr>
                            </th:block>
                        </tbody>
                    </table>
                </div>

                <!-- Empty State (hidden by default) -->
                <div class="empty-state hidden" id="empty-history">
                    <i class="fas fa-inbox fa-3x"></i>
                    <h3>No Order History</h3>
                    <p>There are no completed orders yet</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="../js/utils.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // History search functionality
            const searchInput = document.getElementById('history-search');
            const tableRows = document.querySelectorAll('.table tbody tr');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();

                tableRows.forEach(row => {
                    const text = row.textContent.toLowerCase();

                    if (text.includes(query)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });
        });
    </script>

</body>

</html>
