<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <!-- Admin Navbar -->
    <section th:replace="~{admin/admin-navbar :: admin-navbar}"></section>

    <!-- Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>Admin Profile</h1>
                    <p>Manage your account settings and information</p>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="container">
            <div class="dashboard-main">
                <div class="card profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div class="profile-info">
                            <h2 class="profile-name">Admin Name</h2>
                            <p class="profile-email">admin@canteen.com</p>
                            <span class="badge badge-primary">Administrator</span>
                        </div>
                    </div>

                    <div class="profile-details">
                        <div class="detail-item">
                            <i class="fas fa-phone"></i>
                            <div class="detail-content">
                                <span class="detail-label">Contact Number</span>
                                <span class="detail-value">+91 9876543210</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-id-card"></i>
                            <div class="detail-content">
                                <span class="detail-label">Roll Number</span>
                                <span class="detail-value">2023CS101</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-calendar"></i>
                            <div class="detail-content">
                                <span class="detail-label">Member Since</span>
                                <span class="detail-value">January 2025</span>
                            </div>
                        </div>
                    </div>

                    <div class="profile-actions">
                        <button class="btn btn-primary edit-profile-btn">
                            <i class="fas fa-edit"></i> Edit Profile
                        </button>
                        <button class="btn btn-danger logout-btn">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <div class="stat-icon primary">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">Total Orders Managed</div>
                            <div class="stat-value">156</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon success">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">Items Added</div>
                            <div class="stat-value">42</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">Customers Served</div>
                            <div class="stat-value">89</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modular JavaScript -->
    <script src="../js/utils.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Edit profile button
            const editBtn = document.querySelector('.edit-profile-btn');
            editBtn.addEventListener('click', () => {
                toast.info('Edit profile modal would open here');
            });

            // Logout button
            const logoutBtn = document.querySelector('.logout-btn');
            logoutBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to logout?')) {
                    toast.success('Logging out...');
                    setTimeout(() => {
                        window.location.href = '../login.html';
                    }, 1000);
                }
            });
        });
    </script>

</body>

</html>
