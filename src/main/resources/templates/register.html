<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- Navbar Component -->
    <section th:replace="~{navbar :: navbar}"></section>

    <!-- Register Section -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Register to start ordering delicious food</p>
            </div>

            <!--  -->
            <form th:action="@{'/get-registered'}" method="post" class="auth-form" id="register-form">
                <!--data-validate-->
                <!-- Full Name -->
                <div class="form-group">
                    <label class="form-label" for="fullname">Full Name</label>
                    <div class="auth-input-group">
                        <input type="text" class="form-input" id="fullname" name="fullname"
                            placeholder="Enter your full name" required>
                        <i class="fas fa-user auth-input-icon"></i>
                    </div>
                </div>


                <!-- Department Number -->
                <div class="form-group">
                    <label class="form-label" for="department">Department Name</label>
                    <div class="auth-input-group">
                        <select class="form-select" id="category-badge" name="department">
                            <option value="">Select category</option>
                            <option value="enginnering">Enginnering</option>
                            <option value="pharmacy">Pharmacy</option>
                            <option value="management">Management</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Enrollment Number -->
                <div class="form-group">
                    <label class="form-label" for="enrollment">Enrollment Number</label>
                    <div class="auth-input-group">
                        <input type="text" class="form-input" id="enrollment" name="enrollment"
                            placeholder="Enter your enrollment number">
                        <i class="fas fa-id-card auth-input-icon"></i>
                    </div>
                </div>



                <!-- Contact -->
                <div class="form-group">
                    <label class="form-label" for="contact">Contact Number</label>
                    <div class="auth-input-group">
                        <input type="tel" class="form-input" id="contact" name="contact"
                            placeholder="Enter your contact number" pattern="[0-9]{10}" required>
                        <i class="fas fa-phone auth-input-icon"></i>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="auth-input-group">
                        <input type="email" class="form-input" id="email" name="email" placeholder="Enter your email"
                            required>
                        <i class="fas fa-envelope auth-input-icon"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="auth-input-group">
                        <input type="password" class="form-input" id="password" name="password"
                            placeholder="Create a password" required>
                        <i class="fas fa-eye auth-input-icon password-toggle"></i>
                    </div>

                    <!-- Password Strength Indicator -->
                    <div class="password-strength">
                        <div class="password-strength-bar">
                            <div class="password-strength-fill" id="password-strength-fill"></div>
                        </div>
                        <div class="password-strength-text" id="password-strength-text">
                            Password strength: Weak
                        </div>
                    </div>

                    <!-- Password Requirements -->
                    <div class="password-requirements">
                        <div class="password-requirement" id="req-capital">
                            <i class="fas fa-circle"></i> At least one capital letter
                        </div>
                        <div class="password-requirement" id="req-special">
                            <i class="fas fa-circle"></i> At least one special character
                        </div>
                        <div class="password-requirement" id="req-number">
                            <i class="fas fa-circle"></i> At least one number
                        </div>
                        <div class="password-requirement" id="req-length">
                            <i class="fas fa-circle"></i> At least 8 characters
                        </div>
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" name="termsCheckbox" id="terms" required>
                        <span>I agree to the Terms & Conditions</span>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" class="auth-submit-btn"> <!--data-loading="Creating account..."-->
                    <i class="fas fa-user-plus"></i>
                    Register
                </button>

                <!-- Divider -->
                <div class="auth-divider">or continue with</div>

                <!-- Social Login -->
                <div class="auth-social-login">
                    <button type="button" class="auth-google-btn">
                        <img src="https://www.google.com/favicon.ico" alt="Google">
                        Sign up with Google
                    </button>
                </div>

                <!-- Login Link -->
                <div class="auth-footer">
                    Already have an account?
                    <a href="login">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer Component -->
    <section th:replace="~{footer :: footer}"></section>

    <!-- Modular JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/app.js"></script>

    <!-- Page-specific JavaScript -->
    <script>

        function iClicked() {
            console.log("Muhhh, Mujhe touch kiya");
        }

        // Password strength validation
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const strengthFill = document.getElementById('password-strength-fill');
            const strengthText = document.getElementById('password-strength-text');

            const reqCapital = document.getElementById('req-capital');
            const reqSpecial = document.getElementById('req-special');
            const reqNumber = document.getElementById('req-number');
            const reqLength = document.getElementById('req-length');

            passwordInput.addEventListener('input', () => {
                const password = passwordInput.value;
                const result = Validator.validatePassword(password);

                // Update requirement indicators
                updateRequirement(reqCapital, result.hasCapital);
                updateRequirement(reqSpecial, result.hasSpecial);
                updateRequirement(reqNumber, result.hasNumber);
                updateRequirement(reqLength, result.hasMinLength);

                // Update strength bar
                strengthFill.className = 'password-strength-fill';
                if (result.hasMinLength) {
                    strengthFill.classList.add('weak');
                }
                if (result.hasMinLength && result.hasNumber) {
                    strengthFill.classList.add('medium');
                }
                if (result.hasMinLength && result.hasNumber && result.hasCapital && result.hasSpecial) {
                    strengthFill.classList.add('strong');
                }

                // Update strength text
                if (result.isValid) {
                    strengthText.textContent = 'Password strength: Strong';
                } else if (result.hasMinLength && result.hasNumber) {
                    strengthText.textContent = 'Password strength: Medium';
                } else if (result.hasMinLength) {
                    strengthText.textContent = 'Password strength: Weak';
                } else {
                    strengthText.textContent = 'Password strength: Very Weak';
                }
            });

            function updateRequirement(element, met) {
                if (met) {
                    element.classList.add('met');
                    element.querySelector('i').className = 'fas fa-check-circle';
                } else {
                    element.classList.remove('met');
                    element.querySelector('i').className = 'fas fa-circle';
                }
            }

            // Register form handling
            // const registerForm = document.getElementById('register-form');

            // registerForm.addEventListener('submit', (e) => {

            //     const password = passwordInput.value;
            //     const result = Validator.validatePassword(password);

            //     if (!result.isValid) {
            //         e.preventDefault();
            //         toast.error('Password does not meet requirements');
            //         return;
            //     }

            //     // Simulate registration (replace with actual API call)
            //     toast.info('Creating account...');

            //     // setTimeout(() => {
            //     //     toast.success('Registration successful!');
            //     //     // Redirect to login page after successful registration
            //     //     setTimeout(() => {
            //     //         window.location.href = 'login.html';
            //     //     }, 1000);
            //     // }, 1500);
            // });

            // // Google register button (UI only - backend OAuth required)
            // const googleBtn = document.querySelector('.auth-google-btn');
            // googleBtn.addEventListener('click', () => {
            //     toast.info('Google OAuth integration required for backend');
            // });

            const registerForm = document.getElementById('register-form');

            registerForm.addEventListener('submit', async (e) => {

                e.preventDefault();

                const submitBtn = registerForm.querySelector('.auth-submit-btn');

                // Start loading
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Creating Account...`;

                try {

                    const formData = new FormData(registerForm);

                    const response = await fetch('/get-registered', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.text();

                    if (result === 'success') {
                        toast.success('Registration Successfull');
                        submitBtn.innerHTML = `<i class="fas fa-check"></i> Success`;

                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);

                    } else if (result == 'alreadyExist') {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = `<i class="fas fa-user-plus"></i>Register`;
                        toast.error('User/Email Already Exist !!!');
                    } else {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = `<i class="fas fa-user-plus"></i>Register`;
                        toast.error('Registration Failed Due To Some Technical Issues');
                    }

                } catch (error) {

                    console.error(error);

                    submitBtn.disabled = false;

                    submitBtn.innerHTML = `<i class="fas fa-user-plus"></i>Register`;

                    // alert("Server error");
                    // toast.success('Registration successful!');
                    setTimeout(() => {
                        toast.error('Registration Failed !!!\nDue To Some Technical Issues');
                        // Redirect to login page after successful registration
                        setTimeout(() => {
                            window.location.href = 'register';
                        }, 1000);
                    }, 1500);

                }

            });
        });
    </script>

</body>

</html>
