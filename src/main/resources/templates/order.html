<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Canteen Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- Navbar Component -->
    <section th:replace="~{navbar :: navbar}"></section>

    <!-- Dashboard -->
    <div class="dashboard">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="container dashboard-header-content">
                <div class="dashboard-title">
                    <h1>My Orders</h1>
                    <p>Track and manage your food orders</p>
                </div>
                <div class="dashboard-actions">
                    <button class="btn btn-primary" onclick="window.location.href=`home`">
                        <i class="fas fa-plus"></i> New Order
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="container">
            <!-- Order Stats -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" th:text="${session.numberOfOrders}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" th:text="${session.totalCompleted}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon warning">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" th:text="${session.totalPending}">---</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon info">
                        <i class="fas fa-rupee-sign"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Spent</div>
                        <span class="stat-value">₹<span th:text="${session.totalSpent}"></span></span>
                        <!-- <div class="stat-value" th:text="${totalSpent}">---</div> -->
                    </div>
                </div>
            </div>

            <!-- Orders List -->
            <div class="dashboard-main">
                <div class="section-header">
                    <h2>Recent Orders</h2>
                </div>

                <div class="orders-list">

                    <!-- <h1>I am order page</h1> -->

                    <th:block th:each="order : ${orders}">

                        <!-- Order 1 - Completed -->
                        <div class="card order-card product-card" 
                            th:if="${order != null and order.isHide == false}"
                            th:data-name="${order.item.itemName}" 
                            th:data-category="${order.item.category}"
                            th:data-status="${order.orderStatus}">
                            <div class="order-card-header">
                                <div class="order-info">
                                    <h3 class="order-title" th:text="${order.item.itemName}">---</h3>
                                </div>
                                <span class="order-status completed"
                                    th:if="${order.orderStatus.toString() == 'COMPLETED'}">
                                    <i class="fas fa-check-circle"></i>
                                    <span th:text="${order.orderStatus}"></span>
                                </span>
                                <span class="order-status pending" th:if="${order.orderStatus.toString() == 'PENDING'}">
                                    <i class="fas fa-clock"></i>
                                    <span th:text="${order.orderStatus}"></span>
                                </span>
                                <span class="order-status cancelled"
                                    th:if="${order.orderStatus.toString() == 'CANCELED'}">
                                    <i class="fas fa-times-circle"></i>
                                    <span th:text="${order.orderStatus}"></span>
                                </span>
                            </div>
                            <div class="order-card-body">
                                <div class="order-image">
                                    <img th:src="${order.item.imageFile}" alt="Food">
                                </div>
                                <div class="order-details">
                                    <span class="order-price">₹<span th:text="${order.item.price}"></span></span>
                                    <span class="order-date"><i class="fas fa-calendar"></i> : <span
                                            th:text="${#temporals.format(order.orderTime, 'dd MMM yyyy hh:mm a')}"></span></span>
                                    <span class="order-quantity">Quantity : <span
                                            th:text="${order.quantity}"></span></span>
                                </div>
                                <div class="order-progress" th:if="${order.orderStatus.toString() == 'COMPLETED'}">
                                    <div class="progress">
                                        <div class="progress-bar success" style="width: 100%;"></div>
                                    </div>
                                    <div class="progress-labels">
                                        <span class="progress-label active">Confirmed - </span>
                                        <span class="progress-label active">- Delivered</span>
                                    </div>
                                </div>
                                <div class="order-progress" th:if="${order.orderStatus.toString() == 'PENDING'}">
                                    <div class="progress">
                                        <div class="progress-bar warning" style="width: 50%;"></div>
                                    </div>
                                    <div class="progress-labels">
                                        <span class="progress-label active">Confirmed - </span>
                                        <span class="progress-label">- Delivered</span>
                                    </div>
                                </div>
                                <div class="order-progress" th:if="${order.orderStatus.toString() == 'CANCELED'}">
                                    <div class="progress">
                                        <div class="progress-bar" style="width: 0%;"></div>
                                    </div>
                                    <div class="progress-labels">
                                        <span class="progress-label">Confirmed - </span>
                                        <span class="progress-label">- Delivered</span>
                                    </div>
                                </div>
                            </div>
                            <div class="order-card-footer"
                                th:if="${order.orderStatus.toString() == 'COMPLETED' or order.orderStatus.toString() == 'CANCELED'}">
                                <button class="btn btn-danger btn-sm" th:onclick="'hideMe(' + ${order.orderId} + ')'">
                                    <i class="fas fa-times"></i>Hide
                                </button>
                            </div>
                        </div>
                    </th:block>

                        <!-- Empty State (hidden by default) -->
                        <div class="empty-state" id="empty-history" th:if="${session.noOrders}">
                            <i class="fas fa-inbox fa-3x"></i>
                            <h3>No Orders</h3>
                            <a href="home" class="btn btn-primary">Browse Menu</a>
                        </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Footer Component -->
    <section th:replace="~{footer :: footer}"></section>

    <!-- Modular JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/app.js"></script>
